# ============================================================
# Spring Boot 애플리케이션 설정 파일
# 실제 운영 환경에서는 환경변수나 application-prod.yml로 분리 권장
# ============================================================

spring:
  # ============================================================
  # DataSource (MySQL)
  # ============================================================
  datasource:
    # 로컬 MySQL 서버 접속 정보 (Docker Compose 사용 시 호스트명 변경 필요)
    url: jdbc:mysql://localhost:3306/olive_market?useSSL=false&serverTimezone=Asia/Seoul&characterEncoding=UTF-8&allowPublicKeyRetrieval=true
    username: root
    password: 1234
    driver-class-name: com.mysql.cj.jdbc.Driver

  # ============================================================
  # JPA / Hibernate 설정
  # ============================================================
  jpa:
    hibernate:
      # create: 앱 시작 시 테이블 재생성 (개발 초기)
      # update: 변경된 컬럼만 반영 (개발 중반)
      # validate: 스키마 검증만 (운영)
      # none: 아무것도 안 함
      ddl-auto: create
    # MariaDB + MySQL 커넥터 호환성 이슈로 Dialect 명시 필요
    # MySQL 커넥터 8.x가 MariaDB에 없는 메타데이터 컬럼 조회 시 오류 발생
    database-platform: org.hibernate.dialect.MariaDBDialect
    properties:
      hibernate:
        # 실행되는 SQL을 콘솔에 출력 (개발 시 ON, 운영 시 OFF)
        show_sql: true
        # SQL을 들여쓰기해서 보기 좋게 출력
        format_sql: true
        # 기본 스키마 지정
        default_batch_fetch_size: 100

  # ============================================================
  # Redis 설정 (장바구니 세션 캐시)
  # ============================================================
  data:
    redis:
      host: localhost   # Redis 서버 호스트 (Docker: redis 컨테이너명)
      port: 6379        # Redis 기본 포트
      # password:       # Redis 비밀번호 (설정한 경우에만 주석 해제)

# ============================================================
# JWT 설정
# ============================================================
jwt:
  # 서명에 사용할 비밀키 (256비트 이상, Base64 인코딩된 문자열)
  # 운영환경에서는 환경변수로 주입: ${JWT_SECRET}
  secret: VGhpcytpc0FJYW5FeGFtcGxlU2VjcmV0S2V5Rm9yT2xpdmVNYXJrZXQyMDI0ISE=
  # 액세스 토큰 만료 시간 (밀리초 기준, 30분 = 30 * 60 * 1000)
  expiration: 1800000

# ============================================================
# 서버 설정
# ============================================================
server:
  port: 8080

# ============================================================
# 로그 레벨 설정
# ============================================================
logging:
  level:
    # SQL 파라미터 바인딩 값 출력 (개발 시 유용)
    org.hibernate.type.descriptor.sql: trace
    com.yhg.olivemarket: debug
